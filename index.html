<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hologram Boy Animation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000105; /* Deep black for contrast */
        }

        #hologram-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Place behind other content */
            filter: blur(1px); /* Soften edges for a glow effect */
        }
    </style>
</head>
<body>

    <canvas id="hologram-canvas"></canvas>

    <script>
        const canvas = document.getElementById('hologram-canvas');
        const ctx = canvas.getContext('2d');
        let animationFrameId;

        // Configuration
        const holoColor = 'rgba(0, 242, 255, 0.6)'; /* Cyan hologram color */
        const flickerColor = 'rgba(188, 140, 255, 0.4)'; /* Purple flicker accent */

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function drawBoy(tox, toy, scale, opacity, color) {
            ctx.save();
            ctx.translate(tox, toy);
            ctx.scale(scale, scale);
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.globalAlpha = opacity;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // Simple vector boy drawing (stick figure style for performance)
            ctx.beginPath();
            
            // Head
            ctx.arc(0, -50, 15, 0, Math.PI * 2); 
            
            // Body
            ctx.moveTo(0, -35);
            ctx.lineTo(0, 10); 
            
            // Arms
            ctx.moveTo(-20, -25);
            ctx.lineTo(20, -25); 
            
            // Legs
            ctx.moveTo(0, 10);
            ctx.lineTo(-15, 40); 
            ctx.moveTo(0, 10);
            ctx.lineTo(15, 40); 

            ctx.stroke();
            ctx.restore();
        }

        function animateHologram() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const time = Date.now() * 0.001; // Current time in seconds

            // Animation parameters
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2 + 50; // Offset slightly downwards
            const baseScale = 2;
            const pulseSpeed = 1.5;
            const pulseIntensity = 0.1;
            const flickerIntensity = 0.3;

            // 1. Calculate Base State
            const pulse = 1 + Math.sin(time * pulseSpeed) * pulseIntensity;
            const currentScale = baseScale * pulse;
            let currentOpacity = 0.6 + Math.sin(time * 3) * 0.1; // Base opacity with slight pulse

            // 2. Add Random Flicker
            let currentColor = holoColor;
            if (Math.random() < 0.05) { // 5% chance of intense flicker per frame
                currentOpacity -= Math.random() * flickerIntensity;
                if (Math.random() < 0.3) {
                    currentColor = flickerColor; // Occasional color shift during flicker
                }
            }
            
            // Ensure opacity stays within bounds
            currentOpacity = Math.max(0.1, Math.min(1, currentOpacity));

            // 3. Draw the Holographic Boy
            // Draw multiple times slightly offset with lower opacity for a "ghosting" / "bloom" effect
            drawBoy(centerX + 2, centerY + 2, currentScale, currentOpacity * 0.3, currentColor);
            drawBoy(centerX - 2, centerY - 2, currentScale, currentOpacity * 0.3, currentColor);
            drawBoy(centerX, centerY, currentScale, currentOpacity, currentColor); // Main drawing

            animationFrameId = requestAnimationFrame(animateHologram);
        }

        // Initialize and handle resizing
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        animateHologram();
    </script>
</body>
</html>
