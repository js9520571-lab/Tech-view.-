<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Core | 3D Archive</title>
    <style>
        body { margin: 0; background: #000205; overflow: hidden; }
        canvas { display: block; }
        /* Add a vignette to hide the edges and create depth like the image */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.9) 100%);
            pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, clock, group, points, lines;
        let servers = [], robots = [];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000205);
            // Thick fog is the secret to the "Image" look
            scene.fog = new THREE.FogExp2(0x000205, 0.003);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 1000);
            camera.position.set(0, 40, 120);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            // Reinhard Tone Mapping makes the neon colors "pop" like the image
            renderer.toneMapping = THREE.ReinhardToneMapping;
            renderer.toneMappingExposure = 1.5;
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();
            group = new THREE.Group();
            scene.add(group);

            // --- 1. THE SERVERS (Glossy Black Monoliths) ---
            const towerGeo = new THREE.BoxGeometry(1, 1, 1);
            for (let i = 0; i < 220; i++) {
                const h = 30 + Math.random() * 100;
                const mat = new THREE.MeshStandardMaterial({ 
                    color: 0x020202, 
                    metalness: 1.0, 
                    roughness: 0.05 // Very shiny for reflections
                });
                const tower = new THREE.Mesh(towerGeo, mat);
                tower.scale.set(12, h, 12);
                tower.position.set((Math.random()-0.5)*900, h/2, (Math.random()-0.5)*900 - 300);
                
                // Neon Strips (Vertical Light)
                const strip = new THREE.Mesh(
                    new THREE.PlaneGeometry(0.5, h),
                    new THREE.MeshBasicMaterial({ color: 0x00f2ff })
                );
                strip.position.set(6.1, 0, 0);
                tower.add(strip);
                
                group.add(tower);
                servers.push(tower);
            }

            // --- 2. THE ROBOTS (Sentinels) ---
            for (let i = 0; i < 25; i++) {
                const r = createRobot();
                scene.add(r);
                robots.push(r);
            }

            // --- 3. THE CONNECTED WEB (Neural Network) ---
            const pGeo = new THREE.BufferGeometry();
            const pCount = 300;
            const pPos = new Float32Array(pCount * 3);
            for(let i=0; i<pCount*3; i++) pPos[i] = (Math.random()-0.5)*400;
            pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
            points = new THREE.Points(pGeo, new THREE.PointsMaterial({color: 0xbc8cff, size: 2}));
            scene.add(points);

            // Lighting
            const ambient = new THREE.AmbientLight(0x101010);
            scene.add(ambient);
            const spot = new THREE.PointLight(0x00f2ff, 2, 500);
            spot.position.set(0, 100, 50);
            scene.add(spot);

            animate();
        }

        function createRobot() {
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.OctahedronGeometry(2), new THREE.MeshStandardMaterial({color: 0x111, metalness: 1}));
            const eye = new THREE.Mesh(new THREE.SphereGeometry(0.7), new THREE.MeshBasicMaterial({color: 0xbc8cff}));
            eye.position.z = 2;
            g.add(body, eye);
            resetRobot(g);
            return g;
        }

        function resetRobot(r) {
            r.position.set((Math.random()-0.5)*500, 40+Math.random()*40, -600);
            r.userData.speed = 1 + Math.random();
        }

        function animate() {
            requestAnimationFrame(animate);
            const d = clock.getElapsedTime();

            group.position.z += 0.5; // Fly-through
            if (group.position.z > 500) group.position.z = 0;

            robots.forEach(r => {
                r.position.z += r.userData.speed;
                r.rotation.y += 0.02;
                r.position.y += Math.sin(d + r.position.x)*0.05;
                if (r.position.z > 200) resetRobot(r);
            });

            // Make the Web pulse
            points.material.opacity = 0.5 + Math.sin(d * 2) * 0.5;

            camera.position.x = Math.sin(d * 0.2) * 10;
            camera.lookAt(0, 40, -100);
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
