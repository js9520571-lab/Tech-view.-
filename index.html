<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Flow Archive</title>
    <style>
        body { margin: 0; background: #000105; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; filter: contrast(1.1) brightness(1.2); }
        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            z-index: 5; pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="vignette"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, clock, group;
        let servers = [], robots = [], particles, lines;
        const PARTICLE_COUNT = 500;
        const CONNECT_DISTANCE = 30;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000205);
            scene.fog = new THREE.FogExp2(0x000205, 0.0025);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(0, 30, 100);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ReinhardToneMapping;
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();
            group = new THREE.Group();
            scene.add(group);

            // --- 1. THE COMPUTERS (Monolith Server Racks with Advanced Materials) ---
            const towerGeo = new THREE.BoxGeometry(1, 1, 1);
            for (let i = 0; i < 200; i++) {
                const h = 40 + Math.random() * 120;
                const mat = new THREE.MeshStandardMaterial({ 
                    color: 0x050505, 
                    metalness: 0.95, 
                    roughness: 0.05 
                });
                const tower = new THREE.Mesh(towerGeo, mat);
                
                tower.scale.set(10, h, 10);
                tower.position.set(
                    (Math.random() - 0.5) * 800,
                    h / 2,
                    (Math.random() - 0.5) * 800 - 200
                );

                // Add blinking "Data LEDs" for depth
                for(let j=0; j<6; j++) {
                    const led = new THREE.Mesh(
                        new THREE.PlaneGeometry(8, 0.5),
                        new THREE.MeshBasicMaterial({ color: 0x00f2ff, transparent: true })
                    );
                    led.position.set(0, (Math.random() - 0.5) * h, 5.1);
                    tower.add(led);
                }
                group.add(tower);
                servers.push(tower);
            }

            // --- 2. THE ROBOTS (Neural Sentinels) ---
            for (let i = 0; i < 30; i++) {
                const robot = createRobot();
                resetRobot(robot);
                scene.add(robot);
                robots.push(robot);
            }

            // --- 3. THE NEURAL FLOW (Blinking Particles & Lines) ---
            const pGeometry = new THREE.BufferGeometry();
            const pPos = new Float32Array(PARTICLE_COUNT * 3);
            const pSpeed = new Float32Array(PARTICLE_COUNT);

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                pPos[i*3] = (Math.random() - 0.5) * 300;
                pPos[i*3+1] = 10 + Math.random() * 80;
                pPos[i*3+2] = (Math.random() - 0.5) * 200;
                pSpeed[i] = Math.random() * 0.2;
            }
            pGeometry.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
            pGeometry.setAttribute('speed', new THREE.BufferAttribute(pSpeed, 1));
            const pMaterial = new THREE.PointsMaterial({ size: 1.5, color: 0x00f2ff, transparent: true, opacity: 0.8 });
            particles = new THREE.Points(pGeometry, pMaterial);
            scene.add(particles);

            // Connections (lines)
            const lGeometry = new THREE.BufferGeometry();
            const lMaterial = new THREE.LineBasicMaterial({ color: 0xbc8cff, transparent: true, opacity: 0.2 });
            lines = new THREE.LineSegments(lGeometry, lMaterial);
            scene.add(lines);

            // --- 4. LIGHTING (Neon Bloom Look) ---
            scene.add(new THREE.AmbientLight(0x202020));
            
            const blueLight = new THREE.PointLight(0x00f2ff, 1.5, 400);
            blueLight.position.set(0, 100, 0);
            scene.add(blueLight);

            animate();
        }

        function createRobot() {
            const rGroup = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.IcosahedronGeometry(2, 1),
                new THREE.MeshStandardMaterial({ color: 0x222, metalness: 1, roughness: 0.1 })
            );
            rGroup.add(body);
            const eye = new THREE.Mesh(
                new THREE.SphereGeometry(0.5, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0x7000ff })
            );
            eye.position.z = 1.8;
            rGroup.add(eye);
            return rGroup;
        }

        function resetRobot(r) {
            r.position.set((Math.random() - 0.5) * 500, 30 + Math.random() * 50, -400);
            r.userData.speed = 1.5 + Math.random() * 2;
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getElapsedTime();

            // Fly-through motion
            group.position.z += 0.4;
            if (group.position.z > 400) group.position.z = 0;

            // Robot Patrol and Blink
            robots.forEach(r => {
                r.position.z += r.userData.speed;
                r.position.y += Math.sin(delta + r.position.x) * 0.05; // Floating sway
                if(Math.random() > 0.99) r.children[1].visible = !r.children[1].visible;
                if (r.position.z > 150) resetRobot(r);
            });

            // Neural Flow (particles & lines)
            const pPos = particles.geometry.attributes.position.array;
            const linePos = [];
            for(let i=0; i<PARTICLE_COUNT; i++) {
                pPos[i*3+1] += particles.geometry.attributes.speed.array[i]; // Rising movement
                if(pPos[i*3+1] > 100) pPos[i*3+1] = 10;
                
                // Draw Connections
                for(let j=i+1; j<PARTICLE_COUNT; j++) {
                    const dx = pPos[i*3] - pPos[j*3];
                    const dy = pPos[i*3+1] - pPos[j*3+1];
                    const dz = pPos[i*3+2] - pPos[j*3+2];
                    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
                    if(dist < CONNECT_DISTANCE) {
                        linePos.push(pPos[i*3], pPos[i*3+1], pPos[i*3+2], pPos[j*3], pPos[j*3+1], pPos[j*3+2]);
                    }
                }
            }
            particles.geometry.attributes.position.needsUpdate = true;
            lines.geometry.setAttribute('position', new THREE.Float32BufferAttribute(linePos, 3));

            // Camera Cinematic Motion
            camera.position.x = Math.sin(delta * 0.1) * 15;
            camera.lookAt(0, 40, -100);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
