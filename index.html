<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Hologram</title>
    <style>
        body { margin: 0; background: #000105; overflow: hidden; }
        canvas { display: block; }
        /* Scanline effect to make it look like a real hologram */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 10; pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, hologram;
        
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 100;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Create Hologram Particles in a Human-like Shape
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const count = 5000;

            for (let i = 0; i < count; i++) {
                // Math to generate a rough "Humanoid" silhouette
                let x, y, z;
                const rand = Math.random();
                
                if (rand > 0.7) { // Head
                    x = (Math.random() - 0.5) * 10;
                    y = 35 + (Math.random() - 0.5) * 10;
                    z = (Math.random() - 0.5) * 10;
                } else if (rand > 0.3) { // Torso
                    x = (Math.random() - 0.5) * 20;
                    y = 10 + (Math.random() - 0.5) * 40;
                    z = (Math.random() - 0.5) * 15;
                } else { // Limbs
                    x = (Math.random() - 0.5) * 30;
                    y = -20 + (Math.random() - 0.5) * 60;
                    z = (Math.random() - 0.5) * 10;
                }
                positions.push(x, y, z);
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

            const material = new THREE.PointsMaterial({
                color: 0x00f2ff,
                size: 0.8,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });

            hologram = new THREE.Points(geometry, material);
            scene.add(hologram);

            // Add a floor grid for perspective
            const grid = new THREE.GridHelper(200, 20, 0x00f2ff, 0x002222);
            grid.position.y = -50;
            scene.add(grid);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const time = Date.now() * 0.001;
            
            // Hologram rotation and flicker
            hologram.rotation.y += 0.01;
            hologram.material.opacity = 0.5 + Math.random() * 0.5;
            
            // Pulse effect
            hologram.scale.setScalar(1 + Math.sin(time * 2) * 0.05);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
