<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Digital Archive</title>
    <style>
        body { margin: 0; background: #000105; overflow: hidden; }
        canvas { display: block; filter: contrast(1.1) brightness(1.2); }
    </style>
</head>
<body>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, clock, group;
        let servers = [], robots = [];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000205);
            scene.fog = new THREE.FogExp2(0x000205, 0.002);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(0, 30, 100);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            // High-end lighting settings
            renderer.toneMapping = THREE.ReinhardToneMapping;
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();
            group = new THREE.Group();
            scene.add(group);

            // --- 1. THE COMPUTERS (Monolith Server Racks) ---
            const towerGeo = new THREE.BoxGeometry(1, 1, 1);
            for (let i = 0; i < 150; i++) {
                const h = 40 + Math.random() * 100;
                const mat = new THREE.MeshStandardMaterial({ 
                    color: 0x050505, 
                    metalness: 0.9, 
                    roughness: 0.1 
                });
                const tower = new THREE.Mesh(towerGeo, mat);
                
                tower.scale.set(8, h, 8);
                tower.position.set(
                    (Math.random() - 0.5) * 800,
                    h / 2,
                    (Math.random() - 0.5) * 800 - 200
                );

                // Add blinking "Data LEDs" to servers
                for(let j=0; j<8; j++) {
                    const led = new THREE.Mesh(
                        new THREE.PlaneGeometry(6, 0.4),
                        new THREE.MeshBasicMaterial({ color: 0x00f2ff, transparent: true })
                    );
                    led.position.set(0, (Math.random() - 0.5) * h, 4.1);
                    tower.add(led);
                }
                group.add(tower);
                servers.push(tower);
            }

            // --- 2. THE ROBOTS (Neural Sentinels) ---
            for (let i = 0; i < 40; i++) {
                const robot = createRobot();
                resetRobot(robot);
                scene.add(robot);
                robots.push(robot);
            }

            // --- 3. LIGHTING (Neon Bloom Look) ---
            const ambient = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambient);

            const blueLight = new THREE.PointLight(0x00f2ff, 2, 500);
            blueLight.position.set(0, 100, 0);
            scene.add(blueLight);

            const purpleLight = new THREE.PointLight(0x7000ff, 2, 500);
            purpleLight.position.set(200, 50, -200);
            scene.add(purpleLight);

            animate();
        }

        function createRobot() {
            const rGroup = new THREE.Group();
            // Head/Body
            const body = new THREE.Mesh(
                new THREE.IcosahedronGeometry(2, 1),
                new THREE.MeshStandardMaterial({ color: 0x222, metalness: 1, roughness: 0.2 })
            );
            rGroup.add(body);

            // Glowing Eye
            const eye = new THREE.Mesh(
                new THREE.SphereGeometry(0.6, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0xff0055 })
            );
            eye.position.z = 1.8;
            rGroup.add(eye);
            
            return rGroup;
        }

        function resetRobot(r) {
            r.position.x = (Math.random() - 0.5) * 500;
            r.position.y = 20 + Math.random() * 60;
            r.position.z = -500;
            r.userData.speed = 1 + Math.random() * 2;
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getElapsedTime();

            // Fly-through motion
            group.position.z += 0.4;
            if (group.position.z > 400) group.position.z = 0;

            // Robot Patrol Logic
            robots.forEach(r => {
                r.position.z += r.userData.speed;
                r.position.y += Math.sin(delta + r.position.x) * 0.05; // Floating sway
                if (r.position.z > 150) resetRobot(r);
            });

            // LED Flicker
            servers.forEach(s => {
                s.children.forEach(led => {
                    if(Math.random() > 0.97) led.visible = !led.visible;
                });
            });

            // Camera Cinematic Sway
            camera.position.x = Math.sin(delta * 0.2) * 20;
            camera.lookAt(0, 40, -100);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
